    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(165deg, #ffe9f1 0%, #fff4f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px 20px;
            color: #3b2a32;
        }

        /* 可爱小点缀：漂浮的点 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: radial-gradient(#ffb8d0 2px, transparent 2px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: -1;
        }

        .main-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 48px 48px 38px 38px;
            box-shadow: 0 30px 45px -15px rgba(250, 120, 160, 0.4);
            overflow: hidden;
            border: 1px solid rgba(255, 200, 220, 0.8);
            margin-bottom: 16px;
        }

        .content-pane {
            padding: 28px 20px 35px;
        }

        /* 锁屏界面 */
        #lockScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }

        .lock-icon {
            font-size: 70px;
            filter: drop-shadow(0 10px 15px rgba(255, 120, 170, 0.5));
            animation: bounce 2.5s infinite ease;
        }

        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-10px); }
        }

        .lock-title {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(145deg, #ff8aad, #ff5a83);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .lock-sub {
            background: #ffecf3;
            padding: 8px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            color: #c45a7c;
            font-weight: 400;
            border: 1px solid #ffc6d8;
        }

        .password-input {
            width: 70%;
            padding: 16px 20px;
            font-size: 1.8rem;
            text-align: center;
            border: 3px solid #ffc2d5;
            border-radius: 60px;
            background: white;
            outline: none;
            letter-spacing: 8px;
            font-weight: 600;
            color: #3b2a32;
        }

        .password-input:focus {
            border-color: #ff87af;
            box-shadow: 0 0 0 6px rgba(255, 130, 180, 0.2);
        }

        .unlock-btn {
            background: #ff9cbb;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 14px 45px;
            border-radius: 60px;
            box-shadow: 0 18px 25px -8px #ffa5c0;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #ffe2ef;
        }

        .unlock-btn:active { transform: scale(0.96); background: #ff7ca5; }

        .error-msg {
            color: #d6376b;
            font-weight: 600;
            min-height: 28px;
        }

        /* 测试主区 */
        #testContent {
            display: none;
        }

        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .brand {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(145deg, #ff6f98, #ff3f70);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

            background: #ffecf3;
            border-radius: 40px;
            padding: 6px 18px;
            font-weight: 600;
            color: #b14568;
            border: 1px solid #ffc6d8;
            font-size: 0.95rem;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 42px;
            padding: 28px 18px 20px;
            margin: 12px 0 16px;
            border: 1px solid #ffe6f0;
            box-shadow: 0 15px 30px -10px #fec0d2;
        }

        .question-number {
            font-size: 1.1rem;
            color: #ff7fa5;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            background: #fff0f7;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 30px;
            border: 1px solid #ffc7db;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 650;
            line-height: 1.4;
            color: #362028;
            margin-bottom: 30px;
            padding: 0 5px;
        }

            display: flex;
            flex-direction: column;
            gap: 12px;
        }

            border-radius: 60px;

            font-size: 1.1rem;
            font-weight: 500;

            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: 0.1s;

        }

        .option-btn.selected {
            background: #ffe3f0;
            border-color: #ff8fb2;
            box-shadow: 0 6px 12px #ffc1d6;
        }

        .option-btn:active {
            background: #ffeef5;
            border-color: #ff8fb2;
            transform: scale(0.98);
        }

        .opt-prefix {
            width: 42px;
            height: 42px;
            background: #ffdae8;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.4rem;
            color: #c74470;
            flex-shrink: 0;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }

        .prev-btn {
            background: #ffe2ef;
            border: 2px solid #ffb7cf;
            color: #b3436b;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 60px;
            flex: 1;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
        }

        .prev-btn:active { background: #ffd0e2; }
        .prev-btn.hidden { visibility: hidden; pointer-events: none; }

        /* 结果卡片 */
        .result-wrap {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 42px;
            padding: 26px 20px 30px;
            margin: 16px 0;
            border: 1px solid #ffe2f0;
        }

        .result-emojibadge {
            font-size: 2rem;
            background: #ffe8f2;
            padding: 10px 22px;
            border-radius: 60px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid #ffc0d5;
            font-weight: 700;
            color: #c2456c;

            border-left: 10px solid #ffa9c5;
            padding: 18px 18px;
            border-radius: 30px;
            font-size: 1.2rem;
            line-height: 1.5;
            color: #4f2e3b;
            margin: 18px 0;
            font-style: italic;
            box-shadow: 0 6px 12px #fde3ed;
        }

        .section {

        }

            font-size: 1.3rem;
            color: #c24a73;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 2px solid #ffd6e5;
            padding-bottom: 5px;

            padding: 18px 16px;
            border-radius: 28px;
            font-size: 1rem;
            line-height: 1.65;
            color: #3b2a32;

        }

            border: 2px dashed #ffb2cc;
            border-radius: 60px;
            padding: 14px 18px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #ba456b;
            text-align: center;
            margin: 28px 0 12px;

            border: 2px solid #ffadc8;
            color: #cb4f7a;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 14px 0;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.1s;
        }

        .restart-btn:active { background: #ffe3f0; }

        /* 底部固定链接 */
        .footer {
            max-width: 420px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 10px 10px;
            border: 1px solid #ffd6e5;
        }

        .footer a {
            text-decoration: none;
            background: #ffe9f2;
            padding: 8px 28px;
            border-radius: 50px;
            color: #bf5177;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-block;
            border: 1px solid #ffbcd2;
        }

        .footer a:active { background: #ffdae8; }

        .hidden { display: none !important; }
    </style>
</head>

                },
                mixed: {
                    title: '混合型机器人 🔀',
                    hit: '你有时自己都搞不懂自己：可以嗨翻全场，也能安静一天；能把计划做得滴水不漏，也会突然来一场说走就走的旅行。',
                    core: '你是“全能混合型机器人”！你身上融合了多种特质，没有单一标签能定义你。这种复合型人格让你在复杂环境中游刃有余。你既可以社交，也能执行；既懂情绪，又会创意。你是AI时代最稀缺的“π型人才”。',
                    mindset: '',
                    strength: '',
                    blind: '',
                    era: '',
                    advice: '试着把你身上的多种特质都发挥出来：社交、执行、情绪、创意——在不同场景调用不同模式，你就是为复杂世界而生的多面手。',
                    tag: '不被定义，正是我的定义 🔥'
                }
            };

            // 当前状态
            let currentIndex = 0;                 // 0~19
            let scores = { social:0, task:0, emotional:0, creative:0 };
            let answers = new Array(20).fill(null); // 存储每题的选项 'A','B','C','D'
            let testFinished = false;

            // DOM 元素
            const lockDiv = document.getElementById('lockScreen');
            const testDiv = document.getElementById('testContent');
            const pwdInput = document.getElementById('pwdInput');
            const unlockBtn = document.getElementById('unlockBtn');
            const pwdError = document.getElementById('pwdError');
            const progressSpan = document.getElementById('progress');
            const questionNumberDiv = document.getElementById('questionNumber');
            const questionDiv = document.getElementById('question');
            const optionsDiv = document.getElementById('optionsList');
            const prevBtn = document.getElementById('prevBtn');
            const questionPanel = document.getElementById('questionPanel');
            const resultPanel = document.getElementById('resultPanel');

            // 密码验证
            unlockBtn.addEventListener('click', ()=>{
                if(pwdInput.value === '3322') {
                    lockDiv.style.display = 'none';
                    testDiv.style.display = 'block';
                    resetTest();
                } else {
                    pwdError.innerText = '密码错误，再试试～';
                    pwdInput.value = '';
                }
            });
            pwdInput.addEventListener('keypress', (e)=> { if(e.key === 'Enter') unlockBtn.click(); });

            // 重置测试
            function resetTest() {
                currentIndex = 0;
                scores = { social:0, task:0, emotional:0, creative:0 };
                answers = new Array(20).fill(null);
                testFinished = false;
                questionPanel.style.display = 'block';
                resultPanel.style.display = 'none';
                renderQuestion();
            }

            // 根据存储的答案更新分数 (用于初始化或上一题后重新计算分数)
            function recalcScores() {
                scores = { social:0, task:0, emotional:0, creative:0 };
                for (let i = 0; i < answers.length; i++) {
                    const ans = answers[i];
                    if (ans) {
                        scores[OPTION_TYPE[ans]] += 1;
                    }
                }
            }

            // 渲染当前题目
            function renderQuestion() {
                if (testFinished) return;
                progressSpan.innerText = `${currentIndex+1}/${QUESTIONS.length}`;
                questionNumberDiv.innerText = `🌸 第${currentIndex+1}题`;
                questionDiv.innerText = QUESTIONS[currentIndex];

                // 生成选项
                let html = '';
                ['A','B','C','D'].forEach((letter, idx) => {
                    const selectedClass = (answers[currentIndex] === letter) ? 'selected' : '';
                    html += `<div class="option-btn ${selectedClass}" data-opt="${letter}">
                        <span class="opt-prefix">${letter}</span>
                        <span>${OPTION_TEXTS[idx]}</span>
                    </div>`;
                });
                optionsDiv.innerHTML = html;

                // 绑定选项事件
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const opt = btn.dataset.opt; // 'A','B','C','D'
                        // 如果已经选了同一个选项，则不做任何改变（也可以允许取消，但为了简单，不取消）
                        if (answers[currentIndex] === opt) return;

                        // 如果之前有选择，需要扣除之前的分数
                        if (answers[currentIndex]) {
                            const oldType = OPTION_TYPE[answers[currentIndex]];
                            scores[oldType] -= 1;
                        }

                        // 记录新选择，增加分数
                        answers[currentIndex] = opt;
                        const newType = OPTION_TYPE[opt];
                        scores[newType] += 1;

                        // 更新当前选项高亮
                        document.querySelectorAll('.option-btn').forEach(b => {
                            b.classList.remove('selected');
                        });
                        btn.classList.add('selected');

                        // 如果不是最后一题，自动进入下一题（也可设计为手动，但原逻辑是自动，我们保持自动）
                        if (currentIndex < QUESTIONS.length - 1) {
                            currentIndex++;
                            renderQuestion();
                        } else {
                            // 完成测试
                            finishTest();
                        }
                    });
                });

                // 控制上一题按钮显示
                if (currentIndex > 0) {
                    prevBtn.classList.remove('hidden');
                } else {
                    prevBtn.classList.add('hidden');
                }
            }

            // 上一题点击处理
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    // 注意：不需要扣分，因为分数已经存储在scores中，且answers保存了之前的选择。
                    // 直接后退，重新渲染题目，保留之前的选择。
                    currentIndex--;
                    renderQuestion();
                }
            });

            // 完成测试，显示结果
            function finishTest() {
                testFinished = true;
                questionPanel.style.display = 'none';
                // 计算最终类型 (可能并列)
                const entries = [
                    { type: 'social', score: scores.social },
                    { type: 'task', score: scores.task },
                    { type: 'emotional', score: scores.emotional },
                    { type: 'creative', score: scores.creative }
                ];
                entries.sort((a,b) => b.score - a.score);
                const topScore = entries[0].score;
                const topTypes = entries.filter(e => e.score === topScore).map(e => e.type);
                const key = (topTypes.length > 1) ? 'mixed' : topTypes[0];
                const res = RESULT[key];

                let html = `<div class="result-wrap">`;
                html += `<div class="result-emojibadge">${res.title}</div>`;

                if (res.hit) {
                    html += `<div class="hit-quote">“${res.hit}”</div>`;
                }

                html += `<div class="section"><h4>✨ 核心特质</h4><div class="section-content">${res.core}</div></div>`;

                if (res.mindset) {
                    html += `<div class="section"><h4>🧠 思维模式</h4><div class="section-content">${res.mindset}</div></div>`;
                }

                if (res.strength) {
                    html += `<div class="section"><h4>⚡️ 你的优势</h4><div class="section-content" style="white-space:pre-line;">${res.strength}</div></div>`;
                }

                if (res.blind) {
                    html += `<div class="section"><h4>⚠️ 你的盲区</h4><div class="section-content" style="white-space:pre-line;">${res.blind}</div></div>`;
                }

                if (res.era) {
                    html += `<div class="section"><h4>🤖 2026 AI时代</h4><div class="section-content">${res.era}</div></div>`;
                }

                if (res.advice) {
                    html += `<div class="section"><h4>💡 行动建议</h4><div class="section-content" style="white-space:pre-line;">${res.advice}</div></div>`;
                }

                html += `<div class="tagline">${res.tag}</div>`;
                html += `<button class="restart-btn" id="restartBtn">🔄 重新测试</button>`;
                html += `</div>`;

                resultPanel.innerHTML = html;
                resultPanel.style.display = 'block';
                document.getElementById('restartBtn').addEventListener('click', resetTest);
            }

            // 初始锁屏状态
            lockDiv.style.display = 'flex';
            testDiv.style.display = 'none';
        })();
    </script>
</body>
</html>
