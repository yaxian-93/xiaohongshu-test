        // 👇 密码验证（直接用onclick，100%触发）
        function checkPassword() {
            const pwdInput = document.getElementById('pwdInput');
            const pwdError = document.getElementById('pwdError');
            const inputPwd = pwdInput.value.trim();
            
            if (inputPwd === '3322') {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('introPage').style.display = 'block';
                pwdInput.value = '';
                pwdError.innerText = '';
            } else {
                pwdError.innerText = '密码错误，再试试～';
                pwdInput.value = '';
                setTimeout(() => pwdInput.focus(), 100);
            }
        }

        // 监听回车触发密码验证
        document.getElementById('pwdInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' || e.keyCode === 13) {
                checkPassword();
            }
        });

        // 开始测试
        function startTest() {
            document.getElementById('introPage').style.display = 'none';
            document.getElementById('testContent').style.display = 'block';
            resetTest();
        }

        // 重置测试
        function resetTest() {
            currentIndex = 0;
            scores = { social:0, task:0, emotional:0, creative:0 };
            answers = new Array(20).fill(null);
            testFinished = false;
            document.getElementById('questionPanel').style.display = 'block';
            document.getElementById('resultPanel').style.display = 'none';
            renderQuestion();
        }

        // 渲染题目
        function renderQuestion() {
            if (testFinished) return;
            const currentQ = QUESTIONS[currentIndex];
            document.getElementById('progress').innerText = `${currentIndex+1}/${QUESTIONS.length}`;
            document.getElementById('questionNumber').innerText = `🌸 第${currentIndex+1}题`;
            document.getElementById('question').innerText = currentQ.text;
            
            let optionsHtml = '';
            ['A','B','C','D'].forEach((letter, idx) => {
                const selected = answers[currentIndex] === letter ? 'selected' : '';
                optionsHtml += `<div class="option-btn ${selected}" onclick="selectOption('${letter}')">
                    <span class="opt-prefix">${letter}</span>
                    <span>${currentQ.options[idx]}</span>
                </div>`;
            });
            document.getElementById('optionsList').innerHTML = optionsHtml;

            // 控制上一题按钮
            document.getElementById('prevBtn').classList.toggle('hidden', currentIndex === 0);
        }

        // 选择选项
        function selectOption(opt) {
            if (answers[currentIndex] === opt) return;
            
            // 扣除之前的分数
            if (answers[currentIndex]) {
                const oldType = OPTION_TYPE[answers[currentIndex]];
                scores[oldType] -= 1;
            }
            
            // 记录新选择并加分
            answers[currentIndex] = opt;
            const newType = OPTION_TYPE[opt];
            scores[newType] += 1;
            
            // 跳转到下一题
            if (currentIndex < QUESTIONS.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                finishTest();
            }
        }

        // 上一题
        function goPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // 完成测试
        function finishTest() {
            testFinished = true;
            document.getElementById('questionPanel').style.display = 'none';
            
            // 计算结果类型
            const entries = [
                { type: 'social', score: scores.social },
                { type: 'task', score: scores.task },
                { type: 'emotional', score: scores.emotional },
                { type: 'creative', score: scores.creative }
            ];
            entries.sort((a,b) => b.score - a.score);
            const topScore = entries[0].score;
            const topTypes = entries.filter(e => e.score === topScore).map(e => e.type);
            const res = RESULT[topTypes.length > 1 ? 'mixed' : topTypes[0]];
            
            // 生成结果HTML
            let resultHtml = `<div class="result-wrap">`;
            resultHtml += `<div class="result-emojibadge">${res.title}</div>`;
            if (res.hit) resultHtml += `<div class="hit-quote">“${res.hit}”</div>`;
            resultHtml += `<div class="section section-core"><h4>✨ 核心特质</h4><div class="section-content">${res.core}</div></div>`;
            if (res.mindset) resultHtml += `<div class="section section-mind"><h4>🧠 思维模式</h4><div class="section-content">${res.mindset}</div></div>`;
            if (res.strength) resultHtml += `<div class="section section-str"><h4>⚡️ 你的优势</h4><div class="section-content" style="white-space:pre-line;">${res.strength}</div></div>`;
            if (res.blind) resultHtml += `<div class="section section-blind"><h4>⚠️ 你的盲区</h4><div class="section-content" style="white-space:pre-line;">${res.blind}</div></div>`;
            if (res.era) resultHtml += `<div class="section section-era"><h4>🤖 2026 AI时代</h4><div class="section-content">${res.era}</div></div>`;
            if (res.advice) resultHtml += `<div class="section section-advice"><h4>💡 行动建议</h4><div class="section-content" style="white-space:pre-line;">${res.advice}</div></div>`;
            resultHtml += `<div class="tagline">${res.tag}</div>`;
            resultHtml += `<div class="result-btns">
                <button class="restart-btn" onclick="startTest()">🔄 重新测试</button>
                <button class="share-btn" onclick="shareTest()">📱 分享好友</button>
            </div>`;
            resultHtml += `</div>`;
            
            document.getElementById('resultPanel').innerHTML = resultHtml;
            document.getElementById('resultPanel').style.display = 'block';
        }
